name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux
            artifact: dcpwizard-linux-x86_64
            binary: dcpwizard
          - os: macos-14
            name: macos
            artifact: dcpwizard-macos-aarch64
            binary: dcpwizard
          - os: windows-2022
            name: windows
            artifact: dcpwizard-windows-x86_64
            binary: dcpwizard.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    # windows: grok source build not wired up and the build needs grok-ffi, so
    # allow it to fail rather than block the run.
    continue-on-error: ${{ matrix.os == 'windows-2022' }}

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxml2-dev \
            libssl-dev \
            libxerces-c-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config libxml2 openssl@3 xerces-c
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$OPENSSL_PREFIX/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_PREFIX/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$OPENSSL_PREFIX/lib:$(brew --prefix xerces-c)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$OPENSSL_PREFIX/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix xerces-c)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:VCPKG_BUILD_TYPE="release"
          vcpkg install libxml2 openssl xerces-c --triplet x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      # build grok (jpeg 2000 codec) from source once per tag, cached.
      # provides libgrokj2k on the pkg-config + loader paths and grk_compress on PATH.
      - name: Cache grok
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/grok-install
          key: grok-${{ runner.os }}-v20.3.6

      - name: Setup grok
        if: runner.os != 'Windows'
        env:
          GROK_TAG: v20.3.6
        run: |
          prefix="$GITHUB_WORKSPACE/grok-install"
          if [ ! -x "$prefix/bin/grk_compress" ]; then
            git clone --depth 1 --recurse-submodules --shallow-submodules --branch "$GROK_TAG" \
              https://github.com/GrokImageCompression/grok.git "$RUNNER_TEMP/grok-src"
            cmake -S "$RUNNER_TEMP/grok-src" -B "$RUNNER_TEMP/grok-build" \
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix"
            cmake --build "$RUNNER_TEMP/grok-build" --parallel "$(getconf _NPROCESSORS_ONLN)"
            cmake --install "$RUNNER_TEMP/grok-build"
          fi
          echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig:$prefix/lib64/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "$prefix/bin" >> "$GITHUB_PATH"

      - name: Build release
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: cargo build --release

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip rust/target/release/${{ matrix.binary }}

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip rust/target/release/${{ matrix.binary }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp rust/target/release/${{ matrix.binary }} dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "rust/target/release/${{ matrix.binary }}" "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  deb:
    runs-on: ubuntu-24.04
    name: Build .deb
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxml2-dev libssl-dev libxerces-c-dev
          cargo install cargo-deb

      # build grok (jpeg 2000 codec) from source once per tag, cached.
      # provides libgrokj2k on the pkg-config + loader paths and grk_compress on PATH.
      - name: Cache grok
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/grok-install
          key: grok-${{ runner.os }}-v20.3.6

      - name: Setup grok
        if: runner.os != 'Windows'
        env:
          GROK_TAG: v20.3.6
        run: |
          prefix="$GITHUB_WORKSPACE/grok-install"
          if [ ! -x "$prefix/bin/grk_compress" ]; then
            git clone --depth 1 --recurse-submodules --shallow-submodules --branch "$GROK_TAG" \
              https://github.com/GrokImageCompression/grok.git "$RUNNER_TEMP/grok-src"
            cmake -S "$RUNNER_TEMP/grok-src" -B "$RUNNER_TEMP/grok-build" \
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix"
            cmake --build "$RUNNER_TEMP/grok-build" --parallel "$(getconf _NPROCESSORS_ONLN)"
            cmake --install "$RUNNER_TEMP/grok-build"
          fi
          echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig:$prefix/lib64/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "$prefix/bin" >> "$GITHUB_PATH"

      - name: Build .deb package
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: cargo deb -p dcpwizard-cli

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcpwizard-deb
          path: rust/target/debian/*.deb

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
