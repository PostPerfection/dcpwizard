name: GUI Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: macos-14
            name: macOS
          - os: windows-2022
            name: Windows

    runs-on: ${{ matrix.os }}
    name: GUI (${{ matrix.name }})
    # windows: grok source build not wired up and the build needs grok-ffi, so
    # allow it to fail rather than block the run.
    continue-on-error: ${{ matrix.os == 'windows-2022' }}

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.8.0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxml2-dev \
            libssl-dev \
            libxerces-c-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config libxml2 openssl@3 xerces-c
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$OPENSSL_PREFIX/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_PREFIX/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$OPENSSL_PREFIX/lib:$(brew --prefix xerces-c)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$OPENSSL_PREFIX/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix xerces-c)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:VCPKG_BUILD_TYPE="release"
          vcpkg install libxml2 openssl xerces-c --triplet x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      # build grok (jpeg 2000 codec) from source once per tag, cached.
      # provides libgrokj2k on the pkg-config + loader paths and grk_compress on PATH.
      - name: Cache grok
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/grok-install
          key: grok-${{ runner.os }}-v20.3.6

      - name: Setup grok
        if: runner.os != 'Windows'
        env:
          GROK_TAG: v20.3.6
        run: |
          prefix="$GITHUB_WORKSPACE/grok-install"
          if [ ! -x "$prefix/bin/grk_compress" ]; then
            git clone --depth 1 --recurse-submodules --shallow-submodules --branch "$GROK_TAG" \
              https://github.com/GrokImageCompression/grok.git "$RUNNER_TEMP/grok-src"
            cmake -S "$RUNNER_TEMP/grok-src" -B "$RUNNER_TEMP/grok-build" \
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix"
            cmake --build "$RUNNER_TEMP/grok-build" --parallel
            cmake --install "$RUNNER_TEMP/grok-build"
          fi
          echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig:$prefix/lib64/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "$prefix/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: gui
        run: pnpm install --frozen-lockfile

      - name: Build CLI sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: |
          cargo build --release -p dcpwizard-cli
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          cp target/release/dcpwizard ../gui/src-tauri/dcpwizard-${TRIPLE}

      - name: Build CLI sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: |
          cargo build --release -p dcpwizard-cli
          Copy-Item "target/release/dcpwizard.exe" "../gui/src-tauri/dcpwizard-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_STATIC: "1"
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "DCP Wizard ${{ github.ref_name }}"
          releaseBody: "See the release notes for details."
          releaseDraft: false
          prerelease: false
