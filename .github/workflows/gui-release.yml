name: GUI Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: macos-14
            name: macOS
          - os: windows-2022
            name: Windows

    runs-on: ${{ matrix.os }}
    name: GUI (${{ matrix.name }})

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libxml2-dev \
            libssl-dev \
            libxerces-c-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake pkg-config libxml2 openssl@3 xerces-c
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$OPENSSL_PREFIX/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_PREFIX/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$OPENSSL_PREFIX/lib:$(brew --prefix xerces-c)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$OPENSSL_PREFIX/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix xerces-c)/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libxml2);$(brew --prefix xerces-c)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:VCPKG_BUILD_TYPE="release"
          vcpkg install libxml2 openssl xerces-c --triplet x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build CLI sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: |
          cargo build --release -p dcpwizard-cli
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          cp target/release/dcpwizard ../gui/src-tauri/dcpwizard-${TRIPLE}

      - name: Build CLI sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: rust
        env:
          OPENSSL_STATIC: "1"
        run: |
          cargo build --release -p dcpwizard-cli
          Copy-Item "target/release/dcpwizard.exe" "../gui/src-tauri/dcpwizard-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_STATIC: "1"
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "DCP Wizard ${{ github.ref_name }}"
          releaseBody: "See the release notes for details."
          releaseDraft: false
          prerelease: false
